training:
  device: cuda
  precision: fp16
  seed: 42
  default_workers: 4
segmentation:
  brain:
    model: SegResNet
    num_classes: 4
    class_names:
    - background
    - NCR
    - edema
    - enhancing_tumor
    roi_size:
    - 128
    - 128
    - 128
    in_channels: 4
    label_remap:
      4: 3
  liver:
    model: SegResNet
    num_classes: 3
    class_names:
    - background
    - liver
    - tumor
    hu_window:
    - -200
    - 300
classification:
  brain_type:
    classes:
    - glioma
    - meningioma
    - notumor
    - pituitary
    num_classes: 4
  brain_grade:
    classes:
    - grade_I
    - grade_II
    - grade_III
    - grade_IV
    num_classes: 4
  skin:
    classes:
    - akiec
    - bcc
    - bkl
    - df
    - mel
    - nv
    - vasc
    num_classes: 7
  breast:
    classes:
    - benign
    - malignant
    num_classes: 2
  spine:
    conditions:
    - spinal_canal_stenosis
    - left_neural_foraminal_narrowing
    - right_neural_foraminal_narrowing
    - left_subarticular_stenosis
    - right_subarticular_stenosis
    levels:
    - L1_L2
    - L2_L3
    - L3_L4
    - L4_L5
    - L5_S1
    severity:
    - normal_mild
    - moderate
    - severe
molecular:
  markers:
  - idh_mutation
  - mgmt_methylation
  - 1p19q_codeletion
agents:
  verification_gate_thresholds:
    brain: 0.97
    lung: 0.95
    breast: 0.95
    liver: 0.93
    skin_melanoma: 0.99
    skin_other: 0.95
    spine: 0.95
  emergency_response_seconds: 30
